# k8s/argo/serviceaccount/serviceaccount.yaml
# ---------------------------------------------------------------------------
# PURPOSE: ServiceAccounts used by Argo Workflows and Argo Events pods to
#          interact with the Kubernetes API (create pods, submit workflows)
#          and pull images from a private Docker Hub registry.
#
# DEPLOY: kubectl apply -f k8s/argo/serviceaccount/serviceaccount.yaml
#
# LEARNING NOTES:
#   - Kubernetes pods run under a ServiceAccount identity.  By default they
#     get the `default` SA which has limited permissions.
#   - `imagePullSecrets` attaches the Docker Hub registry credentials to the
#     SA so every pod using it can pull private images without specifying
#     imagePullSecrets in each individual pod spec.
#   - `operate-workflow-sa` (referenced by the Sensor) needs a ClusterRole
#     binding that grants `workflows.argoproj.io/create`.  That binding
#     must be applied separately via:
#       kubectl create clusterrolebinding operate-workflow-binding \
#         --clusterrole=argo-workflow-role \
#         --serviceaccount=argo-events:operate-workflow-sa
# ---------------------------------------------------------------------------

# `default` SA in argo-events namespace — used by WorkflowTemplate pods
# (workflow-template.yaml references serviceAccountName: default).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: default
  namespace: argo-events
imagePullSecrets:
  - name: docker-registry-creds  # Allows pods to pull measureapp/* Docker images

---
# `argo-service-account` — general-purpose SA for Argo-related pods
# that need Docker Hub access.  Can be used as an alternative to `default`
# in deployment specs to improve least-privilege separation.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-service-account
  namespace: argo-events
imagePullSecrets:
  - name: docker-registry-creds
